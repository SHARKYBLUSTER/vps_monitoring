<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="common.login_title">Connexion - VPS Monitoring</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    /* Variables CSS pour le mode sombre */
    :root {
      --bg-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --bg-secondary: #f8f9fa;
      --text-primary: #333;
      --text-secondary: #7f8c8d;
      --text-light: white;
      --card-bg: white;
      --card-text: #2c3e50;
      --border-color: rgba(0,0,0,0.1);
      --shadow-color: rgba(0,0,0,0.2);
    }

    /* Mode sombre */
    .dark-mode {
      --bg-primary: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      --bg-secondary: #2d3748;
      --text-primary: #e2e8f0;
      --text-secondary: #a0aec0;
      --text-light: white;
      --card-bg: #2d3748;
      --card-text: #e2e8f0;
      --border-color: rgba(255,255,255,0.1);
      --shadow-color: rgba(0,0,0,0.3);
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      transition: background 0.3s ease;
    }
    
    .login-container {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 16px 32px var(--shadow-color);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    
    .login-header {
      margin-bottom: 30px;
    }
    
    .login-header h1 {
      color: var(--card-text);
      font-size: 1.8rem;
      margin-bottom: 10px;
    }
    
    .login-header p {
      color: var(--text-secondary);
      font-size: 1rem;
    }
    
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .form-group {
      text-align: left;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--card-text);
      font-weight: 600;
      font-size: 0.95rem;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      outline: none;
      background: var(--bg-secondary);
      color: var(--text-primary);
    }
    
    .form-group input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .login-btn {
      background: linear-gradient(90deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      margin-top: 10px;
    }
    
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(102, 126, 234, 0.3);
    }
    
    .login-btn:active {
      transform: translateY(0);
    }
    
    .error-message {
      background: var(--alert-bg-danger);
      color: #721c24;
      padding: 12px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #dc3545;
      text-align: left;
      font-size: 0.9rem;
    }
    
    .login-footer {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #ecf0f1;
      color: #7f8c8d;
      font-size: 0.85rem;
    }
    
    .login-footer a {
      color: #667eea;
      text-decoration: none;
    }
    
    .login-footer a:hover {
      text-decoration: underline;
    }
    
    .credentials-info {
      margin-top: 20px;
      padding: 15px;
      background: var(--bg-secondary);
      border-radius: 8px;
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-align: left;
    }
    
    .credentials-info strong {
      color: var(--card-text);
    }
    
    .credentials-info code {
      background: var(--bg-secondary);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.8rem;
    }
    
    .dark-mode .login-footer a {
      color: #93c5fd;
    }
  </style>
  <!-- Font Awesome CDN pour les icônes -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" />
</head>
<body>
  <div class="login-container">
    <div class="login-header" style="margin-bottom: 20px;">
      <h1>🔒 <span data-i18n="login.title">Connexion</span></h1>
      <p data-i18n="common.subtitle">VPS Monitoring Dashboard</p>
    </div>

    <form class="login-form" action="/login" method="POST">
      <div class="form-group">
        <label for="username" data-i18n="login.username">Utilisateur</label>
        <input type="text" id="username" name="username" data-i18n-placeholder="login.user_placeholder" placeholder="admin" required autofocus>
      </div>
      
      <div class="form-group">
        <label for="password" data-i18n="login.password">Mot de passe</label>
        <input type="password" id="password" name="password" data-i18n-placeholder="login.password_placeholder" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="login-btn" data-i18n="login.submit">Se connecter</button>
    </form>

    <div class="credentials-info">
      <p>
        <strong data-i18n="login.credentials">Identifiants par défaut :</strong><br>
        <span data-i18n="login.username">Utilisateur</span> : <code>admin</code><br>
        <span data-i18n="login.password">Mot de passe</span> : <code>changer_mot_de_passe</code> (<span data-i18n="login.modify_in_env">à modifier dans</span> <code>.env</code>)
      </p>
    </div>

    <div class="login-footer">
      <p data-i18n="common.footer">© 2026 - VPS Monitoring v0.4.0</p>
    </div>
  </div>

  <!-- Charger i18n avant le script qui l'utilise -->
  <script src="/js/i18n.js"></script>

  <!-- Affichage des erreurs via JavaScript (si redirection avec param error) -->
  <script>
    // Attendre que i18n soit chargé
    async function waitForI18n() {
      return new Promise(resolve => {
        const checkI18n = setInterval(() => {
          if (window.i18n && window.i18n.loaded) {
            clearInterval(checkI18n);
            resolve();
          }
        }, 100);
      });
    }
    
    // Vérifier si l'URL contient ?error=1
    if (window.location.search.includes('error=1')) {
      waitForI18n().then(() => {
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-message';
        errorDiv.textContent = window.i18n.t('login.error');
        
        const form = document.querySelector('.login-form');
        form.parentNode.insertBefore(errorDiv, form);
        
        // Effacer le paramètre de l'URL
        window.history.replaceState({}, document.title, window.location.pathname);
      });
    }
    
    // Charger le nom d'utilisateur depuis le localStorage
    document.addEventListener('DOMContentLoaded', async () => {
      await waitForI18n();
      
      const savedUsername = localStorage.getItem('vps_monitoring_username');
      const usernameInput = document.getElementById('username');
      
      if (savedUsername && usernameInput) {
        usernameInput.value = savedUsername;
      }
      
      // Appliquer le mode sombre/clair depuis la configuration
      const savedDarkMode = localStorage.getItem('vps_monitoring_dark_mode');
      if (savedDarkMode === 'true') {
        document.body.classList.add('dark-mode');
      }
      
      // Sauvegarder le nom d'utilisateur dans le localStorage à la soumission
      const loginForm = document.querySelector('.login-form');
      if (loginForm) {
        loginForm.addEventListener('submit', () => {
          const username = usernameInput.value;
          if (username) {
            localStorage.setItem('vps_monitoring_username', username);
          }
        });
      }
    });
  </script>
</body>
</html>
