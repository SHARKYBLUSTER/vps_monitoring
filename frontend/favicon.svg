<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Favicon : Loupe pour VPS Monitoring -->
  
  <!-- Arrière-plan transparent -->
  <rect width="100" height="100" fill="none"/>
  
  <!-- Manche de la loupe (noir) -->
  <path d="M65 70 Q75 50 80 35" stroke="#000000" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- Cercle de la loupe (bordure noire) -->
  <circle cx="40" cy="35" r="22" fill="none" stroke="#000000" stroke-width="6"/>
  
  <!-- Centre bleu de la loupe -->
  <circle cx="40" cy="35" r="16" fill="#3A86FF"/>
  
  <!-- Reflet blanc dans le centre bleu (effet verre) -->
  <circle cx="35" cy="30" r="4" fill="#FFFFFF" opacity="0.6"/>
  
  <!-- Ombre légère pour le relief du manche -->
  <path d="M65 70 Q75 50 80 35" stroke="#000000" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.2" transform="translate(2, 2)"/>
</svg>
