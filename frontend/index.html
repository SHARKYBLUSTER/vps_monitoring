<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPS Monitoring Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    /* Fallback pour Font Awesome si le CDN ne charge pas */
    [class^="fa-"], [class*=" fa-"] {
      font-family: 'Font Awesome 6 Free', 'Font Awesome 5 Free', serif;
      font-weight: 900;
    }
    
    /* Variables CSS pour le mode sombre */
    :root {
      --bg-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --bg-secondary: #f8f9fa;
      --text-primary: #333;
      --text-secondary: #7f8c8d;
      --text-light: white;
      --card-bg: white;
      --card-text: #2c3e50;
      --border-color: rgba(0,0,0,0.1);
      --shadow-color: rgba(0,0,0,0.1);
      --alert-bg-warning: #fff3cd;
      --alert-bg-danger: #f8d7da;
      --alert-bg-success: #d4edda;
      --table-header-bg: #f8f9fa;
      --table-border: #dee2e6;
      --table-hover: #f8f9fa;
      --progress-bg: #ecf0f1;
    }

    /* Mode sombre */
    .dark-mode {
      --bg-primary: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      --bg-secondary: #2d3748;
      --text-primary: #e2e8f0;
      --text-secondary: #a0aec0;
      --text-light: white;
      --card-bg: #2d3748;
      --card-text: #e2e8f0;
      --border-color: rgba(255,255,255,0.1);
      --shadow-color: rgba(0,0,0,0.3);
      --alert-bg-warning: #4a3c1a;
      --alert-bg-danger: #491d25;
      --alert-bg-success: #1d3a2e;
      --table-header-bg: #3a475a;
      --table-border: #4a5568;
      --table-hover: #3a475a;
      --progress-bg: #4a5568;
    }

    /* Styles spécifiques pour le mode sombre */
    .dark-mode .metric-value,
    .dark-mode .stat-value,
    .dark-mode .stat-label,
    .dark-mode .stat-details {
      color: var(--text-light);
      opacity: 1;
    }

    .dark-mode .filter-btn {
      background: var(--card-bg);
      border-color: var(--table-border);
      color: var(--text-primary);
    }

    .dark-mode .filter-btn:hover {
      background: var(--table-header-bg);
    }

    .dark-mode .sort-btn {
      background: var(--card-bg);
      border-color: var(--table-border);
      color: var(--text-primary);
    }

    .dark-mode .sort-btn:hover {
      background: var(--table-header-bg);
    }

    .dark-mode .sort-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .dark-mode .filter-btn.active {
      background: #4CAF50;
      color: white;
    }

    .dark-mode .processes-table th,
    .dark-mode .ports-table th {
      background: var(--table-header-bg);
      color: var(--text-primary);
      border-bottom-color: var(--table-border);
    }

    .dark-mode .processes-table td,
    .dark-mode .ports-table td {
      border-bottom-color: var(--table-border);
    }

    .dark-mode .processes-table tr:hover,
    .dark-mode .ports-table tr:hover {
      background: var(--table-hover);
    }

    .dark-mode .no-alerts {
      color: #4ade80;
    }

    .dark-mode .no-data {
      color: var(--text-secondary);
    }

    .dark-mode footer {
      color: var(--text-light);
      opacity: 0.8;
    }

    .dark-mode .metric-card h2 i,
    .dark-mode .section-card h2 i {
      color: #93c5fd;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-primary);
      min-height: 100vh;
      padding: 20px;
      color: var(--text-primary);
      transition: background 0.3s ease, color 0.3s ease;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      margin-bottom: 30px;
      color: var(--text-light);
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }
    
    header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    
    header p {
      font-size: 1.1rem;
      opacity: 0.9;
    }
    
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .metric-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 16px var(--shadow-color);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .metric-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.25);
    }
    
    .metric-card h2 {
      font-size: 1.2rem;
      margin-bottom: 15px;
      color: var(--card-text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Style pour toutes les sections principales en cartes blanches */
    .section-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 8px 16px var(--shadow-color);
      margin-bottom: 20px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .section-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px var(--shadow-color);
    }

    .section-card h2 {
      margin-bottom: 20px;
      color: var(--card-text);
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-card h2 i {
      color: #667eea;
      font-size: 1.3em;
      width: 30px;
      text-align: center;
    }

    .section-card > :not(h2):first-child {
      margin-top: 15px;
    }
    
    .metric-value {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 10px;
      color: #667eea;
    }
    
    .progress-container {
      height: 10px;
      background: var(--progress-bg);
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 5px;
      transition: width 0.5s ease;
    }
    
    .metric-details {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-top: 10px;
    }
    
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
      text-transform: uppercase;
    }
    
    .status-badge.online {
      background: #d4edda;
      color: #155724;
    }
    
    .status-badge.offline {
      background: #f8d7da;
      color: #721c24;
    }
    
    /* Alertes - utiliser les variables CSS */
    .alert.warning {
      background: var(--alert-bg-warning);
      color: #856404;
      border-left: 4px solid #ffc107;
    }
    
    .alert.danger {
      background: var(--alert-bg-danger);
      color: #721c24;
      border-left: 4px solid #dc3545;
    }
    
    .alert.success {
      background: var(--alert-bg-success);
      color: #155724;
      border-left: 4px solid #28a745;
    }
    
    .alert {
      padding: 10px 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .no-alerts {
      color: #28a745;
      font-style: italic;
      text-align: center;
      padding: 20px;
    }

    .filter-btn {
      padding: 8px 16px;
      background: #f0f0f0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 0.9rem;
    }

    .filter-btn:hover {
      background: #e0e0e0;
    }

    .filter-btn.active {
      background: #4CAF50;
      color: white;
    }

    .chart-container {
      position: relative;
      height: 300px;
      width: 100%;
      margin: 20px 0;
    }
    
    footer {
      text-align: center;
      color: white;
      opacity: 0.8;
      margin-top: 30px;
      font-size: 0.9rem;
    }
    
    .last-update {
      font-weight: bold;
    }

    /* Section des processus */
    .processes-controls {
      margin-bottom: 15px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .sort-btn {
      padding: 8px 16px;
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s ease;
      color: #495057;
    }

    .sort-btn:hover {
      background: #e9ecef;
    }

    .sort-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .processes-table-container {
      overflow-x: auto;
    }

    .processes-table {
      width: 100%;
      border-collapse: collapse;
    }

    .processes-table th,
    .processes-table td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid #dee2e6;
    }

    .processes-table th {
      background: #f8f9fa;
      font-weight: 600;
      color: #495057;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .processes-table tr:hover {
      background: #f8f9fa;
    }

    .no-data {
      text-align: center;
      color: #6c757d;
      font-style: italic;
      padding: 20px;
    }

    .processes-hint {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #6c757d;
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .processes-hint i {
      font-size: 0.8rem;
      opacity: 0.7;
    }

    .dark-mode .processes-hint {
      color: var(--text-secondary);
    }

    /* Barres de progression pour CPU/RAM dans le tableau */
    .process-bar {
      display: inline-block;
      height: 8px;
      background: #e9ecef;
      border-radius: 4px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .process-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    /* NOUVEAU : Styles pour les graphiques de métriques */
    .chart-filters, .card-filters {
      margin: 15px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chart-filters .filter-btn, .card-filters .filter-btn {
      padding: 6px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--table-border);
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      color: var(--text-primary);
    }

    .chart-filters .filter-btn:hover, .card-filters .filter-btn:hover {
      background: var(--table-header-bg);
    }

    .chart-filters .filter-btn.active, .card-filters .filter-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .charts-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .chart-card {
      background: var(--card-bg);
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 4px 8px var(--shadow-color);
      border: 1px solid var(--table-border);
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .chart-card h3 {
      margin-bottom: 10px;
      color: var(--card-text);
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chart-wrapper {
      position: relative;
      height: 250px;
      width: 100%;
    }

    @media (max-width: 768px) {
      .charts-container {
        grid-template-columns: 1fr;
      }
    }

    /* Section Ports */
    .ports-table-container {
      overflow-x: auto;
    }

    .ports-table {
      width: 100%;
      border-collapse: collapse;
    }

    .ports-table th,
    .ports-table td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid #dee2e6;
    }

    .ports-table th {
      background: #f8f9fa;
      font-weight: 600;
      color: #495057;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .ports-table tr:hover {
      background: #f8f9fa;
    }

    /* Icônes de statut des ports */
    .port-status {
      display: inline-block;
      margin-right: 8px;
      font-size: 1.1em;
    }

    .port-status.local {
      color: #28a745;
    }

    .port-status.external {
      color: #ffc107;
    }

    .port-status.unknown {
      color: #6c757d;
    }

    @media (max-width: 768px) {
      .metrics-grid {
        grid-template-columns: 1fr;
      }
      
      header h1 {
        font-size: 1.8rem;
      }
      
      .auth-info {
        margin-top: 15px;
        text-align: center;
      }
    }
    
    /* Auth styles */
    .auth-info {
      display: flex;
      align-items: center;
    }
    
    .logout-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      font-size: 0.9rem;
      transition: background 0.3s ease;
    }
    
    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    
    .theme-toggle-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.9rem;
      margin: 0 10px;
      transition: background 0.3s ease, transform 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .theme-toggle-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
    }
    
    .dark-mode .theme-toggle-btn {
      background: var(--card-bg);
      border-color: var(--table-border);
      color: var(--text-primary);
    }
    
    .dark-mode .theme-toggle-btn:hover {
      background: var(--table-header-bg);
    }
    
    .dark-mode .logout-btn {
      background: var(--card-bg);
      border-color: var(--table-border);
      color: var(--text-primary);
    }
    
    .dark-mode .logout-btn:hover {
      background: var(--table-header-bg);
    }

    /* ==================== MODAL DE CONFIGURATION ==================== */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
    }

    .modal.active {
      display: flex;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: var(--card-bg);
      border-radius: 12px;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px var(--shadow-color);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 25px;
      border-bottom: 1px solid var(--border-color);
      background: var(--table-header-bg);
    }

    .modal-header h2 {
      color: var(--card-text);
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .close-btn:hover {
      background: var(--border-color);
      color: var(--text-primary);
    }

    .modal-body {
      padding: 25px;
    }

    .config-section {
      margin-bottom: 25px;
    }

    .config-section:not(:last-child) {
      padding-bottom: 25px;
      border-bottom: 1px solid var(--border-color);
    }

    .config-section h3 {
      color: var(--card-text);
      font-size: 1.1rem;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .config-description {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: var(--card-text);
      font-size: 0.95rem;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .input-with-hint {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-with-hint input {
      flex: 1;
      padding: 12px 15px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 1rem;
      background: var(--bg-secondary);
      color: var(--card-text);
      transition: all 0.2s;
    }

    .input-with-hint input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .hint {
      font-size: 0.8rem;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .interval-presets {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .preset-btn {
      padding: 10px 15px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--card-text);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .preset-btn:hover {
      background: var(--table-header-bg);
      border-color: #667eea;
      color: #667eea;
    }

    .preset-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .config-actions {
      display: flex;
      gap: 15px;
      justify-content: flex-end;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid var(--border-color);
    }

    .save-btn, .cancel-btn {
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .save-btn {
      background: #4CAF50;
      color: white;
    }

    .save-btn:hover {
      background: #45a049;
      transform: translateY(-1px);
    }

    .cancel-btn {
      background: var(--bg-secondary);
      color: var(--card-text);
      border: 1px solid var(--border-color);
    }

    .cancel-btn:hover {
      background: var(--border-color);
    }

    .config-status {
      margin-top: 15px;
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }

    .config-status.info {
      background: #d1ecf1;
      color: #0c5460;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .config-status.success {
      background: var(--alert-bg-success);
      color: #155724;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .config-status.error {
      background: var(--alert-bg-danger);
      color: #721c24;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Bouton de configuration dans le header */
    .config-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.3s ease;
      margin-right: 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .config-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .dark-mode .modal-content {
      background: var(--card-bg);
      box-shadow: 0 20px 60px var(--shadow-color);
    }

    .dark-mode .modal-header {
      background: var(--table-header-bg);
      border-bottom-color: var(--border-color);
    }

    .dark-mode .modal-header h2 {
      color: var(--text-light);
    }

    .dark-mode .close-btn:hover {
      background: var(--border-color);
      color: var(--text-primary);
    }

    .dark-mode .form-group label {
      color: var(--text-primary);
    }

    .dark-mode .input-with-hint input {
      background: var(--table-header-bg);
      border-color: var(--border-color);
      color: var(--text-primary);
    }

    .dark-mode .input-with-hint input:focus {
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
    }

    .dark-mode .preset-btn {
      background: var(--table-header-bg);
      border-color: var(--border-color);
      color: var(--text-primary);
    }

    .dark-mode .preset-btn:hover {
      background: var(--table-border);
    }

    .dark-mode .preset-btn.active {
      background: #667eea;
      color: white;
    }

    .dark-mode .cancel-btn {

  <!-- Vérification d'authentification au chargement -->
  <script>
    // Variable globale pour suivre l'état d'authentification
    window.authCheckComplete = false;
    window.userAuthenticated = false;
    
    // Fonction pour vérifier l'authentification
    async function checkAuthentication() {
      try {
        const response = await fetch('/api/user', { credentials: 'include' });
        const data = await response.json();
        
        window.userAuthenticated = data.authenticated;
        window.authCheckComplete = true;
        
        if (!data.authenticated) {
          // Rediriger vers la page de login
          window.location.href = '/login';
          return false;
        }
        return true;
      } catch (error) {
        console.error('Erreur vérification auth:', error);
        // Si erreur de réseau, rediriger vers login aussi
        window.location.href = '/login';
        return false;
      }
    }
    
    // Vérifier immédiatement et stocker la promesse
    window.authPromise = checkAuthentication();
    
    // Attendre que l'auth soit vérifiée avant de continuer
    document.addEventListener('DOMContentLoaded', async () => {
      await window.authPromise;
      // Le reste du code peut s'exécuter
    });
  </script>

    <footer>
      <p><span data-i18n="common.footer"></span></p>
      <p><span data-i18n="common.last_update"></span> <span id="last-update">--</span></p>
    </footer>
  </div>

  <!-- Charger Chart.js avant les scripts qui l'utilisent -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <script>
    // Fonction pour formater les octets en GB/MB/KB
    function formatBytes(bytes) {
      if (bytes === 0) return '0';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return (bytes / Math.pow(k, i)).toFixed(1);
    }

    // Fonction pour mettre à jour les métriques
    async function updateMetrics() {
      try {
        // Récupérer les métriques et le réseau en parallèle
        const [metricsResponse, networkResponse, alertsResponse] = await Promise.all([
          fetch('/api/metrics', { credentials: 'include' }),
          fetch('/api/network', { credentials: 'include' }),
          fetch('/api/alerts', { credentials: 'include' })
        ]);

        if (!metricsResponse.ok || !networkResponse.ok || !alertsResponse.ok) {
          throw new Error(window.i18n ? window.i18n.t('error') : 'Error loading data');
        }
        
        const metricsData = await metricsResponse.json();
        const networkData = await networkResponse.json();
        const alertsData = await alertsResponse.json();
        
        if (metricsData.success && metricsData.data) {
          const metrics = metricsData.data;
          
          // Mettre à jour le CPU
          if (metrics.cpu) {
            document.getElementById('cpu-usage').textContent = `${metrics.cpu.usage.toFixed(1)}%`;
            document.getElementById('cpu-cores').textContent = metrics.cpu.cores || '--';
          }
          
          // Mettre à jour la RAM
          if (metrics.memory) {
            document.getElementById('mem-usage').textContent = `${metrics.memory.usagePercent.toFixed(1)}%`;
            document.getElementById('mem-used').textContent = `${formatBytes(metrics.memory.used)}`;
            document.getElementById('mem-total').textContent = `${formatBytes(metrics.memory.total)}`;
          }
          
          // Mettre à jour le Disque
          if (metrics.disk) {
            document.getElementById('disk-usage').textContent = `${metrics.disk.usagePercent.toFixed(1)}%`;
            document.getElementById('disk-used').textContent = `${formatBytes(metrics.disk.used)}`;
            document.getElementById('disk-total').textContent = `${formatBytes(metrics.disk.total)}`;
          }
          
          // Mettre à jour le Réseau
          if (networkData.success && networkData.data) {
            const network = networkData.data;
            document.getElementById('network-status').textContent = network.total.download !== undefined ? (window.i18n ? window.i18n.t('metrics.online') : 'Online') : (window.i18n ? window.i18n.t('metrics.offline') : 'Offline');
            document.getElementById('network-download').textContent = `${formatBytes(network.total.download * 1024)}`;
            document.getElementById('network-upload').textContent = `${formatBytes(network.total.upload * 1024)}`;
          }
          
          // Mettre à jour les alertes
          updateAlerts(alertsData);
          
          // Mettre à jour l'horodatage
          const now = new Date();
          document.getElementById('last-update').textContent = now.toLocaleString('fr-FR');
        }
      } catch (error) {
        console.error('Error:', error);
        const msg = window.i18n ? window.i18n.t('error') + ': ' + window.i18n.t('common.loading') : '❌ Error loading metrics. Check if the server is running.';
        document.getElementById('alerts-list').innerHTML = 
          `<div class="alert danger"><span>${msg}</span></div>`;
      }
    }

    // Fonction pour générer le message d'alerte en fonction du type et de la langue
    function getAlertMessage(alert) {
      if (window.i18n) {
        switch(alert.metric) {
          case 'cpu':
            return window.i18n.t('alerts.cpu_high', { value: alert.value.toFixed(1) });
          case 'memory':
            return window.i18n.t('alerts.memory_high', { value: alert.value.toFixed(1) });
          case 'disk':
            return window.i18n.t('alerts.disk_critical', { value: alert.value.toFixed(1) });
          default:
            return alert.type || 'Alert';
        }
      } else {
        // Fallback sans i18n
        switch(alert.metric) {
          case 'cpu':
            return `⚠️ High CPU usage: ${alert.value.toFixed(1)}%`;
          case 'memory':
            return `⚠️ High memory usage: ${alert.value.toFixed(1)}%`;
          case 'disk':
            return `🚨 Critical disk space: ${alert.value.toFixed(1)}% used`;
          default:
            return alert.type || 'Alert';
        }
      }
    }

    // Fonction pour mettre à jour les alertes
    function updateAlerts(alertsData) {
      const alertsList = document.getElementById('alerts-list');
      
      if (alertsData.success && alertsData.data && alertsData.data.length > 0) {
        alertsList.innerHTML = alertsData.data.map(alert => 
          `<div class="alert ${alert.type || 'warning'}">
            <span>${getAlertMessage(alert)}</span>
          </div>`
        ).join('');
      } else {
        const noAlertsText = window.i18n ? window.i18n.t('sections.no_alerts') : '✅ No active alerts.';
        alertsList.innerHTML = `<p class="no-alerts">${noAlertsText}</p>`;
      }
    }

    // Variables pour le tri des processus
    let currentProcesses = [];
    let currentSort = 'cpu';

    // Fonction pour formater un nombre avec 1 décimale
    function formatNumber(num) {
      if (num === undefined || num === null) return '--';
      return num.toFixed(1);
    }

    // Fonction pour créer une barre de progression
    function createProgressBar(value) {
      if (value === undefined || value === null) return '';
      const width = Math.min(value, 100);
      return `<span class="process-bar"><span class="process-bar-fill" style="width: ${width}%"></span></span>`;
    }

    // Fonction pour mettre à jour les processus
    async function updateProcesses() {
      try {
        const response = await fetch('/api/processes', { credentials: 'include' });
        if (!response.ok) throw new Error(window.i18n ? window.i18n.t('error') : 'Error loading processes');
        
        const data = await response.json();
        if (data.success && data.data && data.data.length > 0) {
          currentProcesses = data.data;
          console.log('📊 Données processus reçues:', currentProcesses.map(p => ({ name: p.name, cpu: p.cpu, mem: p.mem })));
          renderProcesses(currentSort);
        } else {
          // Afficher un message utile si aucun processus n'est retourné
          const message = data.message || (window.i18n ? window.i18n.t('processes.permissions_required') : 'No processes found (requires elevated permissions)');
          const hint = window.i18n ? window.i18n.t('processes.permissions_hint') : 'Run with sudo or configure permissions:';
          const command = window.i18n ? window.i18n.t('processes.permissions_command') : 'sudo setcap cap_sys_ptrace,cap_dac_read_search+ep /usr/bin/node';
          document.getElementById('processes-list').innerHTML = 
            `<tr><td colspan="5" class="no-data">${message}<br>
            <small style="font-size: 0.8em; color: #666;">
              ${hint}<br>
              <code>${command}</code>
            </small></td></tr>`;
        }
      } catch (error) {
        console.error('Error loading processes:', error);
        const msg = window.i18n ? window.i18n.t('processes.error_loading_processes') : 'Unable to load processes. Check if the server has the necessary permissions.';
        document.getElementById('processes-list').innerHTML = 
          `<tr><td colspan="5" class="no-data">${msg}</td></tr>`;
      }
    }

    // Fonction pour rendre les processus
    function renderProcesses(sortBy) {
      const processesList = document.getElementById('processes-list');
      
      if (!currentProcesses || currentProcesses.length === 0) {
        processesList.innerHTML = '<tr><td colspan="5" class="no-data">Aucun processus trouvé</td></tr>';
        return;
      }

      // Trier les processus
      const sorted = [...currentProcesses].sort((a, b) => {
        if (sortBy === 'cpu') return b.cpu - a.cpu;
        if (sortBy === 'mem') return b.mem - a.mem;
        return 0;
      });

      // Générer le HTML
      processesList.innerHTML = sorted.map(p => `
        <tr>
          <td>${p.pid || '--'}</td>
          <td>${p.name || '--'}</td>
          <td>${p.user || '--'}</td>
          <td>${formatNumber(p.cpu)}%${createProgressBar(p.cpu)}</td>
          <td>${formatNumber(p.mem)}%${createProgressBar(p.mem)}</td>
        </tr>
      `).join('');

      // Mettre à jour les boutons de tri
      document.getElementById('sort-cpu').className = sortBy === 'cpu' ? 'sort-btn active' : 'sort-btn';
      document.getElementById('sort-mem').className = sortBy === 'mem' ? 'sort-btn active' : 'sort-btn';
    }

    // Fonction pour changer le tri
    function sortProcesses(sortBy) {
      currentSort = sortBy;
      renderProcesses(currentSort);
    }

    // Base de données des ports connus
    const knownPorts = {
      20: { name: 'FTP', typeKey: 'services.file_transfer', security: 2 },
      21: { name: 'FTP', typeKey: 'services.file_transfer', security: 2 },
      22: { name: 'SSH', typeKey: 'services.secure_connection', security: 3 },
      23: { name: 'Telnet', typeKey: 'services.unsecure_connection', security: 1 },
      25: { name: 'SMTP', typeKey: 'services.email_send', security: 2 },
      53: { name: 'DNS', typeKey: 'services.name_resolution', security: 3 },
      80: { name: 'HTTP', typeKey: 'services.web', security: 2 },
      110: { name: 'POP3', typeKey: 'services.email_receive', security: 2 },
      123: { name: 'NTP', typeKey: 'services.time_sync', security: 3 },
      143: { name: 'IMAP', typeKey: 'services.email', security: 2 },
      443: { name: 'HTTPS', typeKey: 'services.secure_web', security: 3 },
      465: { name: 'SMTPS', typeKey: 'services.secure_email_send', security: 3 },
      587: { name: 'SMTP', typeKey: 'services.email_submission', security: 2 },
      993: { name: 'IMAPS', typeKey: 'services.secure_email', security: 3 },
      995: { name: 'POP3S', typeKey: 'services.secure_email_receive', security: 3 },
      1433: { name: 'MySQL', typeKey: 'services.database', security: 3 },
      1434: { name: 'MySQL', typeKey: 'services.database', security: 3 },
      1521: { name: 'Oracle DB', typeKey: 'services.database', security: 3 },
      2701: { name: 'MongoDB', typeKey: 'services.nosql_database', security: 2 },
      3306: { name: 'MySQL', typeKey: 'services.database', security: 3 },
      3389: { name: 'RDP', typeKey: 'services.remote_desktop', security: 1 },
      5432: { name: 'PostgreSQL', typeKey: 'services.database', security: 3 },
      5900: { name: 'VNC', typeKey: 'services.remote_desktop', security: 1 },
      6379: { name: 'Redis', typeKey: 'services.cache', security: 3 },
      8080: { name: 'HTTP Alt', typeKey: 'services.alternative_web', security: 2 },
      8443: { name: 'HTTPS Alt', typeKey: 'services.alternative_secure_web', security: 3 },
      9200: { name: 'Elasticsearch', typeKey: 'services.search_engine', security: 2 },
      27017: { name: 'MongoDB', typeKey: 'services.nosql_database', security: 2 }
    };

    // Fonction pour obtenir les infos d'un port
    function getPortInfo(port) {
      if (!port) return { name: window.i18n ? window.i18n.t('services.unknown') : 'Unknown', type: window.i18n ? window.i18n.t('services.unknown') : 'Unknown', security: 0 };
      
      const portNum = parseInt(port);
      if (knownPorts[portNum]) {
        const portData = knownPorts[portNum];
        return {
          name: portData.name,
          type: window.i18n ? window.i18n.t(portData.typeKey) : portData.typeKey,
          security: portData.security
        };
      }
      
      // Ports courants non listés
      if (portNum >= 1024 && portNum <= 49151) {
        return { name: window.i18n ? window.i18n.t('services.custom') : 'Custom Application', type: window.i18n ? window.i18n.t('services.custom') : 'Custom Application', security: 2 };
      } else if (portNum >= 49152 && portNum <= 65535) {
        return { name: window.i18n ? window.i18n.t('services.dynamic') : 'Dynamic/Ephemeral Port', type: window.i18n ? window.i18n.t('services.dynamic') : 'Dynamic/Ephemeral Port', security: 1 };
      }
      
      return { name: window.i18n ? window.i18n.t('services.unknown') : 'Unknown', type: window.i18n ? window.i18n.t('services.unknown') : 'Unknown', security: 0 };
    }

    // Fonction pour obtenir le niveau de sécurité en étoiles
    function getSecurityStars(securityLevel) {
      const stars = '⭐'.repeat(securityLevel);
      const empty = '☆'.repeat(3 - securityLevel);
      return stars + empty;
    }

    // Fonction pour détecter le type d'adresse IPv6
    function getIPv6Type(address) {
      if (!address || !address.includes(':')) return null;
      
      // Normaliser l'adresse (supprimer les zéros inutiles pour la comparaison)
      const normalized = address.toLowerCase().trim();
      
      const i18n = window.i18n;
      
      // Loopback IPv6
      if (normalized === '::1' || normalized === '0:0:0:0:0:0:0:1') {
        return { type: 'loopback', icon: '🟢', title: i18n ? i18n.t('ports.loopback') + ' (IPv6)' : 'Local (loopback IPv6)', cssClass: 'local' };
      }
      
      // Toutes interfaces IPv6
      if (normalized === '::' || normalized === '0:0:0:0:0:0:0:0') {
        return { type: 'all', icon: '🟠', title: i18n ? i18n.t('ports.all_interfaces') + ' (IPv6) - ' + i18n.t('ports.external') : 'All interfaces IPv6 - Accessible from outside', cssClass: 'external' };
      }
      
      // Link-local IPv6 (fe80::/10)
      if (normalized.startsWith('fe80:') || normalized.startsWith('fe80::')) {
        return { type: 'link-local', icon: '🟢', title: i18n ? 'IPv6 ' + i18n.t('ports.link_local') : 'IPv6 Link-local (local network only)', cssClass: 'local' };
      }
      
      // Unique local address (fc00::/7)
      if (normalized.startsWith('fc00:') || normalized.startsWith('fd00:')) {
        return { type: 'unique-local', icon: '🟡', title: i18n ? 'IPv6 ' + i18n.t('ports.unique_local') + ' (private network)' : 'IPv6 Unique Local (private network)', cssClass: 'external' };
      }
      
      // Adresses IPv6 globales (2000::/3 et autres)
      // Si ce n'est pas loopback, link-local ou unique-local, c'est probablement global
      return { type: 'global', icon: '🟠', title: i18n ? 'IPv6 ' + i18n.t('ports.global') + ' - Accessible from Internet' : 'IPv6 Global - Accessible from Internet', cssClass: 'external' };
    }

    // Fonction pour déterminer si un port est local ou externe
    function getPortStatusIcon(address) {
      if (!address) return '<span class="port-status unknown" title="' + (window.i18n ? window.i18n.t('services.unknown') : 'Unknown') + '">❓</span>';
      
      const i18n = window.i18n;
      
      // Adresses locales IPv4 : 127.0.0.* (toutes les IPs loopback), localhost
      const isLocalhostIPv4 = address === 'localhost' || 
                             address.startsWith('127.0.0.') ||
                             address === '127.0.1.1';
      
      if (isLocalhostIPv4) {
        return '<span class="port-status local" title="' + (i18n ? i18n.t('ports.loopback') : 'Local (loopback)') + '">🟢</span>';
      }
      
      // Vérifier si c'est une adresse IPv6
      const ipv6Info = getIPv6Type(address);
      if (ipv6Info) {
        return `<span class="port-status ${ipv6Info.cssClass}" title="${ipv6Info.title}">${ipv6Info.icon}</span>`;
      }
      
      // IPv4 : toutes interfaces
      if (address === '0.0.0.0' || address === '*') {
        return '<span class="port-status external" title="' + (i18n ? i18n.t('ports.all_interfaces') + ' (IPv4) - ' + i18n.t('ports.external') : 'All IPv4 interfaces - Accessible from outside') + '">🟠</span>';
      }
      
      // Autres adresses IPv4 - considérer comme externe par défaut
      return '<span class="port-status external" title="' + (i18n ? i18n.t('ports.external') + ' (IPv4)' : 'External (IPv4)') + '">🟠</span>';
    }

    // Fonction pour obtenir le type d'IP (IPv4 ou IPv6)
    function getIPVersion(address) {
      if (!address) return '?';
      if (address.includes(':')) {
        return 'IPv6';
      }
      return 'IPv4';
    }

    // Fonction pour formater l'adresse avec plus de détails
    function formatPortAddress(address, port) {
      if (!address) return '--';
      
      // Nettoyer l'adresse (supprimer les crochets éventuels comme dans [::1])
      let cleanAddress = address.trim();
      if (cleanAddress.startsWith('[') && cleanAddress.endsWith(']')) {
        cleanAddress = cleanAddress.slice(1, -1);
      }
      
      const i18n = window.i18n;
      const loopbackText = i18n ? i18n.t('ports.loopback') : '(loopback)';
      const allInterfacesText = i18n ? i18n.t('ports.all_interfaces') : '(all interfaces)';
      const linkLocalText = i18n ? i18n.t('ports.link_local') : '(link-local)';
      const uniqueLocalText = i18n ? i18n.t('ports.unique_local') : '(unique-local)';
      const globalText = i18n ? i18n.t('ports.global') : '(global)';
      
      // Pour les adresses IPv6
      if (cleanAddress.includes(':')) {
        const normalized = cleanAddress.toLowerCase();
        
        // Loopback IPv6
        if (normalized === '::1' || normalized === '0:0:0:0:0:0:0:1') {
          return `${address} ${loopbackText}`;
        }
        
        // Toutes interfaces IPv6
        if (normalized === '::' || normalized === '0:0:0:0:0:0:0:0') {
          return `${address} ${allInterfacesText}`;
        }
        
        // Link-local IPv6 (fe80::/10)
        if (normalized.startsWith('fe80:')) {
          return `${address} ${linkLocalText}`;
        }
        
        // Unique local address (fc00::/7)
        if (normalized.startsWith('fc00:') || normalized.startsWith('fd00:')) {
          return `${address} ${uniqueLocalText}`;
        }
        
        // Adresses IPv6 globales - ajouter annotation générique
        return `${address} ${globalText}`;
      }
      
      // Pour les adresses IPv4
      if (address.startsWith('127.0.0.')) {
        return `${address} ${loopbackText}`;
      } else if (address === '0.0.0.0') {
        return `${address} ${allInterfacesText}`;
      } else {
        return address;
      }
    }

    // Fonction pour mettre à jour les ports ouverts
    async function updatePorts() {
      try {
        const response = await fetch('/api/ports', { credentials: 'include' });
        if (!response.ok) throw new Error(window.i18n ? window.i18n.t('error') : 'Error loading ports');
        
        const data = await response.json();
        const portsList = document.getElementById('ports-list');
        
        if (data.success && data.data && data.data.length > 0) {
          portsList.innerHTML = data.data.map(port => {
            const icon = getPortStatusIcon(port.address);
            const formattedAddress = formatPortAddress(port.address, port.port);
            const portInfo = getPortInfo(port.port);
            const securityStars = getSecurityStars(portInfo.security);
            const ipVersion = getIPVersion(port.address);
            
            return `
              <tr>
                <td>${icon} ${port.port || '--'}</td>
                <td>${formattedAddress}</td>
                <td>${ipVersion}</td>
                <td>${portInfo.name}</td>
                <td>${portInfo.type}</td>
                <td title="${window.i18n ? window.i18n.t('ports.security_level', {level: portInfo.security}) : 'Security Level: ' + portInfo.security + '/3'}">${securityStars}</td>
              </tr>
            `;
          }).join('');
        } else {
          const msg = window.i18n ? window.i18n.t('ports.no_ports') : 'No open ports found';
          portsList.innerHTML = `<tr><td colspan="6" class="no-data">${msg}</td></tr>`;
        }
      } catch (error) {
        console.error('Error loading ports:', error);
        const msg = window.i18n ? window.i18n.t('ports.error_loading_ports') : 'Unable to load open ports';
        document.getElementById('ports-list').innerHTML = 
          `<tr><td colspan="6" class="no-data">${msg}</td></tr>`;
      }
    }

    // Fonction pour mettre à jour les infos Docker
    async function updateDockerInfo() {
      try {
        const response = await fetch('/api/docker-simple', { credentials: 'include' });
        const data = await response.json();
        if (data.success && data.data) {
          const info = data.data;
          document.getElementById('docker-running').textContent = info.running || 0;
          document.getElementById('docker-stopped').textContent = info.stopped || 0;
          document.getElementById('docker-total').textContent = info.total || 0;
          if (!info.available) {
            document.getElementById('docker-section').style.display = 'none';
          }
        } else {
          document.getElementById('docker-section').style.display = 'none';
        }
      } catch (error) {
        document.getElementById('docker-section').style.display = 'none';
      }
    }

    // ====================
    // Graphique Réseau
    // ====================
    window.networkChart = null;
    let currentPeriod = 'day';

    // Fonction pour charger l'historique réseau
    async function loadNetworkHistory(period = 'day') {
      try {
        const response = await fetch(`/api/network-history?period=${period}`, { credentials: 'include' });
        const data = await response.json();
        return data;
      } catch (error) {
        console.error('❌ Error loading network history:', error);
        return { success: false, error: window.i18n ? window.i18n.t('error') : 'Error loading data' };
      }
    }

    // Fonction pour mettre à jour le graphique
    async function updateNetworkChart(period) {
      currentPeriod = period;
      
      // Récupérer le canvas et son conteneur parent spécifiquement pour le réseau
      const canvas = document.getElementById('networkChart');
      const chartWrapper = canvas ? canvas.closest('.chart-wrapper') : null;
      
      console.log('📊 Données réseau reçues pour période:', period);
      
      const data = await loadNetworkHistory(period);
      console.log('📊 Données réseau reçues:', data);

      if (!data.success || !data.data || !data.data.labels || data.data.labels.length === 0) {
        console.warn('⚠️ No data available for period:', period, '| Data:', data);
        // Afficher un message dans le conteneur du graphique
        if (chartWrapper) {
          const msg = window.i18n ? window.i18n.t('charts.no_data_chart') : 'No data available. Wait 5-10 minutes for collection.';
          chartWrapper.innerHTML = `<p style="text-align: center; color: #666; padding: 20px;">${msg}</p>`;
        }
        return;
      }

      // Met à jour les boutons actifs (uniquement pour le réseau)
      document.querySelectorAll('.card-filters .filter-btn[data-metric="network"]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.period === period);
      });

      if (!canvas) {
        console.error('❌ Canvas networkChart introuvable !');
        if (chartWrapper) {
          chartWrapper.innerHTML = '<p style="text-align: center; color: #dc3545; padding: 20px;">Erreur : Élément graphique introuvable.</p>';
        }
        return;
      }
      const ctx = canvas.getContext('2d');
      if (!ctx) {
        console.error('❌ Contexte 2D introuvable pour le canvas réseau !');
        if (chartWrapper) {
          chartWrapper.innerHTML = '<p style="text-align: center; color: #dc3545; padding: 20px;">Erreur : Contexte graphique introuvable.</p>';
        }
        return;
      }

      // Detruit le graphique existant s'il existe
      if (window.networkChart) {
        window.networkChart.destroy();
        window.networkChart = null;
      }

      // Vérifier que Chart.js est chargé
      if (typeof Chart === 'undefined' && typeof window.Chart === 'undefined') {
        console.error('❌ Chart.js n\'est pas chargé !');
        if (chartWrapper) {
          chartWrapper.innerHTML = '<p style="text-align: center; color: #dc3545; padding: 20px;">Erreur : Chart.js non chargé. Vérifiez votre connexion internet.</p>';
        }
        return;
      }

      // Utiliser window.Chart si Chart n'est pas disponible directement
      const ChartLib = typeof Chart !== 'undefined' ? Chart : window.Chart;
      if (!ChartLib) {
        console.error('❌ Impossible de trouver Chart.js !');
        if (chartWrapper) {
          chartWrapper.innerHTML = '<p style="text-align: center; color: #dc3545; padding: 20px;">Erreur : Bibliothèque Chart.js introuvable.</p>';
        }
        return;
      }
      const isDark = document.body.classList.contains('dark-mode');
      const colors = getChartColors(isDark);
      
      // Formater les labels pour n'afficher que HH:MM au lieu de YYYY-MM-DD HH:MM:SS avec décalage horaire
      const formattedLabels = data.data.labels.map(label => {
        const adjustedDate = applyTimezoneOffset(label, currentConfig.timezoneOffset);
        return adjustedDate.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      });

      window.networkChart = new ChartLib(ctx, {
        type: 'line',
        data: {
          labels: formattedLabels,
          datasets: [
            {
              label: window.i18n ? window.i18n.t('charts.download_label') : 'Download (KB)',
              data: data.data.download,
              borderColor: colors.networkDownload,
              backgroundColor: colors.networkDownload.replace('rgb', 'rgba').replace(')', ', 0.2)'),
              tension: 0.1,
              yAxisID: 'y',
            },
            {
              label: window.i18n ? window.i18n.t('charts.upload_label') : 'Upload (KB)',
              data: data.data.upload,
              borderColor: colors.networkUpload,
              backgroundColor: colors.networkUpload.replace('rgb', 'rgba').replace(')', ', 0.2)'),
              tension: 0.1,
              yAxisID: 'y',
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: {
              type: 'linear',
              display: true,
              position: 'left',
              title: {
                display: true,
                text: 'Trafic (KB)',
                color: colors.titleColor
              },
              ticks: {
                color: colors.textColor
              },
              grid: {
                color: colors.gridColor
              }
            },
            x: {
              ticks: {
                color: colors.textColor
              },
              grid: {
                color: colors.gridColor
              }
            }
          },
          plugins: {
            tooltip: {
              callbacks: {
                label: function(context) {
                  return `${context.dataset.label}: ${context.raw.toFixed(2)} KB`;
                },
              },
            },
            legend: {
              position: 'top',
              labels: {
                color: colors.textColor
              }
            },
          },
        },
      });
    }

    // Initialisation - DÉSACTIVÉ : sera géré par updateFrontendIntervals après vérification d'auth
    // document.addEventListener('DOMContentLoaded', () => {
    //   updateMetrics();
    //   updateProcesses();
    //   updatePorts();
    //   updateDockerInfo();
    // });

    // qui est appelé après vérification d'auth et chargement de la config
