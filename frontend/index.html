  <!-- NOUVEAU : Gestion des graphiques de métriques -->
  <script>
    // Variables globales pour les graphiques
    let cpuChart, memoryChart, diskChart;
    
    // Fonction pour obtenir les couleurs des graphiques selon le mode
    function getChartColors(isDarkMode = false) {
      if (isDarkMode) {
        return {
          cpu: 'rgb(100, 200, 255)',
          memory: 'rgb(180, 100, 255)',
          disk: 'rgb(255, 180, 100)',
          networkDownload: 'rgb(100, 200, 255)',
          networkUpload: 'rgb(255, 120, 150)',
          gridColor: 'rgba(255, 255, 255, 0.1)',
          textColor: '#e2e8f0',
          titleColor: '#e2e8f0'
        };
      } else {
        return {
          cpu: 'rgb(75, 192, 192)',
          memory: 'rgb(153, 102, 255)',
          disk: 'rgb(255, 159, 64)',
          networkDownload: 'rgb(75, 192, 192)',
          networkUpload: 'rgb(255, 99, 132)',
          gridColor: 'rgba(0, 0, 0, 0.1)',
          textColor: '#666',
          titleColor: '#666'
        };
      }
    }
    
    // Fonction pour rafraîchir tous les graphiques avec les bonnes couleurs
    function refreshAllCharts() {
      const isDark = document.body.classList.contains('dark-mode');
      const colors = getChartColors(isDark);
      
      // Rafraîchir les graphiques CPU, RAM, Disk
      ['cpu', 'memory', 'disk'].forEach(metric => {
        const chart = window[`${metric}Chart`];
        if (chart && chart.data && chart.data.datasets && chart.data.datasets[0]) {
          const dataset = chart.data.datasets[0];
          const colorKey = metric;
          dataset.borderColor = colors[colorKey];
          dataset.backgroundColor = colors[colorKey].replace('rgb', 'rgba').replace(')', ', 0.1)');
          chart.options.scales.y.title.color = colors.titleColor;
          chart.options.scales.x.title.color = colors.titleColor;
          chart.options.scales.y.ticks.color = colors.textColor;
          chart.options.scales.x.ticks.color = colors.textColor;
          chart.options.scales.y.grid.color = colors.gridColor;
          chart.options.scales.x.grid.color = colors.gridColor;
          chart.update();
        }
      });
      
      // Rafraîchir le graphique réseau
      if (window.networkChart && window.networkChart.data && window.networkChart.data.datasets && 
          window.networkChart.data.datasets[0] && window.networkChart.data.datasets[1]) {
        const downloadDataset = window.networkChart.data.datasets[0];
        const uploadDataset = window.networkChart.data.datasets[1];
        downloadDataset.borderColor = colors.networkDownload;
        downloadDataset.backgroundColor = colors.networkDownload.replace('rgb', 'rgba').replace(')', ', 0.2)');
        uploadDataset.borderColor = colors.networkUpload;
        uploadDataset.backgroundColor = colors.networkUpload.replace('rgb', 'rgba').replace(')', ', 0.2)');
        window.networkChart.options.scales.y.title.color = colors.titleColor;
        window.networkChart.options.scales.y.ticks.color = colors.textColor;
        window.networkChart.options.scales.y.grid.color = colors.gridColor;
        window.networkChart.options.scales.x.grid.color = colors.gridColor;
        window.networkChart.update();
      }
    }
    
    // Périodes par métrique (pour des filtres indépendants)
    const chartPeriods = {
      cpu: 'day',
      memory: 'day',
      disk: 'day'
    };

    // Fonction pour charger les données d'un graphique
    async function loadChartData(metric, period) {
      try {
        // Pour le jour, on veut toutes les données (limite plus élevée)
        // Pour semaine/mois, 100 points suffisent (max 30 ou 7 jours)
        const limit = period === 'day' ? 500 : 100;
        const response = await fetch(`/api/history/${metric}?period=${period}&limit=${limit}`, { credentials: 'include' });
        if (!response.ok) throw new Error('Impossible de charger les données');

        const data = await response.json();
        if (!data.success || !data.data) return [];
        
        // S'assurer que data.data est un tableau
        if (!Array.isArray(data.data)) {
          console.error(`❌ Données ${metric} non valides: attendu un tableau, reçu`, typeof data.data);
          return [];
        }
        
        // Les données sont déjà filtrées/agregées par le backend selon la période
        return data.data;
      } catch (error) {
        console.error(`❌ Erreur chargement ${metric}:`, error);
        return [];
      }
    }

    // Fonction utilitaire pour appliquer le décalage horaire à une date
    function applyTimezoneOffset(dateString, offsetHours) {
      if (!dateString) {
        return new Date();
      }
      
      try {
        const date = new Date(dateString);
        // Si offsetHours est 0, retourner la date sans modification
        if (offsetHours === 0) {
          return date;
        }
        // Appliquer le décalage en minutes (offsetHours * 60)
        const offsetMinutes = offsetHours * 60;
        const localDate = new Date(date.getTime() + offsetMinutes * 60000);
        return localDate;
      } catch (error) {
        console.warn('⚠️ Impossible d\'appliquer le décalage horaire:', error);
        return new Date(dateString);
      }
    }

    // Fonction pour appliquer la visibilité de la section Docker
    function applyDockerSectionVisibility() {
      const dockerSection = document.getElementById('docker-section');
      if (dockerSection) {
        dockerSection.style.display = currentConfig.showDockerSection ? 'block' : 'none';
      }
    }

    // Fonction pour formater les labels selon la période
    // Pour 'day': les données ont un champ 'timestamp' (ISO string)
    // Pour 'week'/'month': les données ont un champ 'label' (format YYYY-MM-DD)
    function formatLabelDate(item, period) {
      let labelText;
      
      if (period === 'day') {
        // Pour le jour, on utilise timestamp et on extrait l'heure
        labelText = item.timestamp;
        const date = applyTimezoneOffset(labelText, currentConfig.timezoneOffset);
        return date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      } else {
        // Pour semaine/mois, on utilise label (format YYYY-MM-DD)
        labelText = item.label;
        const date = applyTimezoneOffset(labelText + 'T00:00:00', currentConfig.timezoneOffset);
        if (period === 'week') {
          return date.toLocaleDateString('fr-FR', { weekday: 'short' });
        } else if (period === 'month') {
          return date.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' });
        }
      }
      return labelText;
    }

    // Fonction pour obtenir le titre de l'axe X selon la période
    function getXAxisTitle(period) {
      return '';
    }

    // Fonction pour créer/mettre à jour un graphique
    function createOrUpdateChart(ctx, data, label, color, period = 'day') {
      if (window.Chart && window.Chart.getChart(ctx)) {
        window.Chart.getChart(ctx).destroy();
      }

      // Vérifier que data est un tableau
      if (!Array.isArray(data)) {
        console.error('❌ Données non valides pour le graphique:', data);
        data = [];
      }

      const isDark = document.body.classList.contains('dark-mode');
      const chartColors = getChartColors(isDark);
      
      // Utiliser la couleur passée en paramètre ou celle par défaut selon la métrique
      const borderColor = color || chartColors.cpu;
      const bgColor = borderColor.replace('rgb', 'rgba').replace(')', ', 0.1)');

      return new Chart(ctx, {
        type: 'line',
        data: {
          labels: data.map(item => formatLabelDate(item, period)),
          datasets: [{
            label: label,
            data: data.map(item => item.value),
            borderColor: borderColor,
            backgroundColor: bgColor,
            tension: 0.1,
            fill: true,
            borderWidth: 2,
            pointRadius: 3,
            pointHoverRadius: 5
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: {
              beginAtZero: true,
              max: 100,
              title: {
                display: true,
                text: '% Utilisation',
                color: chartColors.titleColor
              },
              ticks: {
                color: chartColors.textColor
              },
              grid: {
                color: chartColors.gridColor
              }
            },
            x: {
              title: {
                display: true,
                text: getXAxisTitle(period),
                color: chartColors.titleColor
              },
              ticks: {
                color: chartColors.textColor
              },
              grid: {
                color: chartColors.gridColor
              }
            }
          },
          plugins: {
            tooltip: {
              callbacks: {
                label: function(context) {
                  return `${context.dataset.label}: ${context.raw.toFixed(1)}%`;
                }
              }
            },
            legend: {
              display: false
            }
          }
        }
      });
    }

    // Fonction pour mettre à jour un graphique spécifique
    async function updateChart(metric) {
      // Ne traiter que les métriques supportées
      const supportedMetrics = ['cpu', 'memory', 'disk'];
      if (!supportedMetrics.includes(metric)) {
        console.error(`❌ Métrique non supportée: ${metric}`);
        return;
      }
      
      const period = chartPeriods[metric];
      const data = await loadChartData(metric, period);
      
      const canvas = document.getElementById(`${metric}Chart`);
      if (!canvas) {
        console.error(`❌ Canvas ${metric}Chart introuvable !`);
        return;
      }
      const ctx = canvas.getContext('2d');
      
      // Couleurs par métrique
      const colors = {
        cpu: 'rgb(75, 192, 192)',
        memory: 'rgb(153, 102, 255)',
        disk: 'rgb(255, 159, 64)'
      };
      const labels = {
        cpu: 'CPU',
        memory: 'RAM',
        disk: 'Disque'
      };
      
      window[`${metric}Chart`] = createOrUpdateChart(ctx, data, labels[metric], colors[metric], period);
    }

    // Gestion des boutons de filtre (par carte) - EXCLUANT le réseau qui a son propre système
    function setupChartFilters() {
      document.querySelectorAll('.card-filters .filter-btn:not([data-metric="network"])').forEach(btn => {
        btn.addEventListener('click', () => {
          const metric = btn.dataset.metric;
          const period = btn.dataset.period;
          
          // Mettre à jour les boutons actifs pour cette carte
          const card = btn.closest('.chart-card');
          card.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('active');
          });
          btn.classList.add('active');

          // Mettre à jour la période pour cette métrique
          chartPeriods[metric] = period;
          
          // Mettre à jour uniquement ce graphique
          updateChart(metric);
        });
      });
      
      // Configurer les event listeners pour les boutons réseau
      document.querySelectorAll('.card-filters .filter-btn[data-metric="network"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const period = btn.dataset.period;
          
          // Mettre à jour les boutons actifs pour le réseau
          document.querySelectorAll('.card-filters .filter-btn[data-metric="network"]').forEach(b => {
            b.classList.remove('active');
          });
          btn.classList.add('active');
          
          // Mettre à jour le graphique réseau
          if (typeof updateNetworkChart === 'function') {
            updateNetworkChart(period);
          }
        });
      });
    }

    // Initialisation au chargement de la page
    document.addEventListener('DOMContentLoaded', () => {
      // Attendre que l'auth soit vérifiée et que Chart.js soit chargé
      window.authPromise.then(() => {
        if (!window.userAuthenticated) {
          console.error('❌ Utilisateur non authentifié, ne pas charger les graphiques');
          return;
        }
        
        // Attendre que Chart.js soit chargé (max 10 secondes)
        const maxAttempts = 100; // 100 * 100ms = 10 secondes
        let attempts = 0;
        const checkChartJS = setInterval(() => {
          attempts++;
          if (window.Chart) {
            clearInterval(checkChartJS);
            setupChartFilters();
            
            // Charger tous les graphiques avec leurs périodes par défaut
            if (typeof updateChart === 'function') {
              updateChart('cpu');
              updateChart('memory');
              updateChart('disk');
            }
            
            // Charger aussi le graphique réseau avec la période par défaut
            if (typeof updateNetworkChart === 'function') {
              updateNetworkChart('day');
            }

            // Mettre à jour les graphiques toutes les minutes
            if (typeof updateChart === 'function') {
              setInterval(() => {
                updateChart('cpu');
                updateChart('memory');
                updateChart('disk');
              }, 60000);
            }
        } else if (attempts >= maxAttempts) {
          clearInterval(checkChartJS);
          console.error('❌ Chart.js ne s\'est pas chargé après 10 secondes. Vérifiez votre connexion internet.');
          // Afficher un message dans tous les conteneurs de graphiques
          document.querySelectorAll('.chart-wrapper').forEach(wrapper => {
            wrapper.innerHTML = '<p style="text-align: center; color: #dc3545; padding: 20px;">Erreur : Chart.js non chargé. Vérifiez votre connexion internet.</p>';
          });
        }
      }, 100);
      });
    });
  </script>

  <!-- Amélioration du graphique réseau existant -->
  <script>
    // Fonction pour formater les labels réseau selon la période
    function formatNetworkLabel(label, period) {
      if (period === 'day') {
        // Label format: "YYYY-MM-DD HH:00"
        const parts = label.split(' ');
        if (parts.length === 2) {
          const timePart = parts[1]; // "HH:00"
          return timePart.substring(0, 5); // Retourne "HH:00"
        }
        return label;
      } else if (period === 'week') {
        // Label format: "YYYY-MM-DD"
        const date = new Date(label + 'T00:00:00');
        return date.toLocaleDateString('fr-FR', { weekday: 'short' });
      } else if (period === 'month') {
        // Label format: "YYYY-MM-DD"
        const date = new Date(label + 'T00:00:00');
        return date.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' });
      }
      return label;
    }
  </script>

  <!-- Script pour la configuration -->
  <script>
    // Variables globales pour la configuration
    let currentConfig = { 
      metricsInterval: 5000,
      dataRetentionMonths: 3,
      timezoneOffset: 0,
      showDockerSection: true,
      telegram: {
        enabled: false,
        botToken: '',
        chatId: '',
        cooldownMinutes: 15,
        notifyResolution: true
      }
    };

    // Fonction pour ouvrir la modal de configuration
    function openConfigModal() {
      const modal = document.getElementById('config-modal');
      if (modal) {
        modal.classList.add('active');
        loadCurrentConfig();
      }
    }

    // Fonction pour fermer la modal de configuration
    function closeConfigModal() {
      const modal = document.getElementById('config-modal');
      if (modal) {
        modal.classList.remove('active');
        hideConfigStatus();
      }
    }

    // Fonction pour charger la configuration actuelle depuis l'API
    async function loadCurrentConfig() {
      try {
        const response = await fetch('/api/config', { credentials: 'include' });
        if (!response.ok) throw new Error('Impossible de charger la configuration');
        
        const data = await response.json();
        if (data.success && data.data) {
          currentConfig = data.data;
          
          // Mettre à jour l'interface
          const intervalInput = document.getElementById('metrics-interval');
          if (intervalInput) {
            intervalInput.value = currentConfig.metricsInterval;
          }
          
          // Mettre à jour la rétention des données
          const retentionInput = document.getElementById('data-retention');
          if (retentionInput) {
            retentionInput.value = currentConfig.dataRetentionMonths || 3;
          }
          
          // Mettre à jour le décalage horaire
          const timezoneInput = document.getElementById('timezone-offset');
          if (timezoneInput) {
            timezoneInput.value = currentConfig.timezoneOffset || 0;
          }
          
          // Mettre à jour l'affichage de la section Docker
          const dockerToggle = document.getElementById('show-docker-toggle');
          if (dockerToggle) {
            dockerToggle.checked = currentConfig.showDockerSection !== false;
          }
          
          // Mettre à jour les seuils d'alerte
          const cpuThresholdInput = document.getElementById('cpu-threshold');
          const memoryThresholdInput = document.getElementById('memory-threshold');
          const diskThresholdInput = document.getElementById('disk-threshold');
          
          if (currentConfig.alerts) {
            if (cpuThresholdInput) {
              cpuThresholdInput.value = currentConfig.alerts.cpuThreshold || 80;
            }
            if (memoryThresholdInput) {
              memoryThresholdInput.value = currentConfig.alerts.memoryThreshold || 85;
            }
            if (diskThresholdInput) {
              diskThresholdInput.value = currentConfig.alerts.diskThreshold || 90;
            }
          } else {
            // Valeurs par défaut si alerts non défini
            if (cpuThresholdInput) cpuThresholdInput.value = 80;
            if (memoryThresholdInput) memoryThresholdInput.value = 85;
            if (diskThresholdInput) diskThresholdInput.value = 90;
          }
          
          // Mettre à jour la configuration Telegram
          const telegramEnabledToggle = document.getElementById('telegram-enabled-toggle');
          const telegramBotTokenInput = document.getElementById('telegram-bot-token');
          const telegramChatIdInput = document.getElementById('telegram-chat-id');
          const telegramCooldownInput = document.getElementById('telegram-cooldown');
          const telegramNotifyResolutionToggle = document.getElementById('telegram-notify-resolution-toggle');
          
          if (currentConfig.telegram) {
            if (telegramEnabledToggle) {
              telegramEnabledToggle.checked = currentConfig.telegram.enabled || false;
            }
            if (telegramBotTokenInput) {
              telegramBotTokenInput.value = currentConfig.telegram.botToken || '';
            }
            if (telegramChatIdInput) {
              telegramChatIdInput.value = currentConfig.telegram.chatId || '';
            }
            if (telegramCooldownInput) {
              telegramCooldownInput.value = currentConfig.telegram.cooldownMinutes || 15;
            }
            if (telegramNotifyResolutionToggle) {
              telegramNotifyResolutionToggle.checked = currentConfig.telegram.notifyResolution !== false;
            }
          }
          
          // Appliquer l'affichage de la section Docker immédiatement
          applyDockerSectionVisibility();
          
          // Mettre à jour les boutons de présélection
          updatePresetButtons();
        }
      } catch (error) {
        console.error('❌ Erreur chargement configuration:', error);
        showConfigStatus('❌ Impossible de charger la configuration', 'error');
      }
      
      // Mettre à jour le bouton de thème selon l'état actuel
      updateThemeToggleButton();
    }

    // Fonction pour mettre à jour le bouton de basculement de thème
    function updateThemeToggleButton() {
      const isDark = document.body.classList.contains('dark-mode');
      const themeOptions = document.querySelectorAll('#config-dark-toggle .theme-option');
      themeOptions.forEach(option => {
        const theme = option.dataset.theme;
        if (theme === 'dark' && isDark) {
          option.classList.add('active');
        } else if (theme === 'light' && !isDark) {
          option.classList.add('active');
        } else {
          option.classList.remove('active');
        }
      });
    }

    // Fonction pour basculer le mode sombre depuis la modal
    function toggleDarkModeFromConfig() {
      const isDark = document.body.classList.contains('dark-mode');
      const newDarkMode = !isDark;
      
      // Appliquer le changement
      document.body.classList.toggle('dark-mode', newDarkMode);
      
      // Sauvegarder la préférence
      localStorage.setItem('vps_monitoring_dark_mode', newDarkMode ? 'true' : 'false');
      
      // Rafraîchir les graphiques avec les nouvelles couleurs
      if (typeof refreshAllCharts === 'function') {
        refreshAllCharts();
      }
      
      // Mettre à jour le bouton dans la modal
      updateThemeToggleButton();
      
      showConfigStatus('✅ Thème mis à jour!', 'success');
    }

    // Fonction pour mettre à jour les boutons de présélection
    function updatePresetButtons() {
      const interval = currentConfig.metricsInterval;
      document.querySelectorAll('.preset-btn').forEach(btn => {
        const value = parseInt(btn.dataset.value);
        if (value === interval) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
    }

    // Fonction pour appliquer une valeur de présélection
    function applyPresetValue(value) {
      const intervalInput = document.getElementById('metrics-interval');
      if (intervalInput) {
        intervalInput.value = value;
        currentConfig.metricsInterval = parseInt(value);
        updatePresetButtons();
      }
    }

    // Fonction pour effacer toutes les données
    async function clearAllData() {
      if (!confirm('⚠️ Êtes-vous SÛR de vouloir effacer TOUTES les données historiques ? Cette action est IRRÉVERSIBLE !')) {
        return;
      }

      try {
        showConfigStatus('🔄 Suppression en cours...', 'info');
        
        const response = await fetch('/api/history/clear-all', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          credentials: 'include'
        });
        
        const data = await response.json();
        
        if (data.success) {
          showConfigStatus(`✅ ${data.message}`, 'success');
          // Recharger la page pour vider les caches et recharger toutes les données
          setTimeout(() => {
            window.location.reload();
          }, 1500);
        } else {
          showConfigStatus(`❌ Erreur: ${data.error || 'Impossible de supprimer les données'}`, 'error');
        }
      } catch (error) {
        console.error('❌ Erreur suppression données:', error);
        showConfigStatus('❌ Impossible de supprimer les données', 'error');
      }
    }

    // Fonction pour sauvegarder la configuration
    async function saveConfig() {
      const intervalInput = document.getElementById('metrics-interval');
      const newInterval = parseInt(intervalInput.value);
      
      if (isNaN(newInterval) || newInterval < 1000) {
        showConfigStatus('❌ L\'intervalle doit être un nombre valide ≥ 1000ms', 'error');
        return;
      }

      const retentionInput = document.getElementById('data-retention');
      const newRetention = parseInt(retentionInput.value);
      
      if (isNaN(newRetention) || newRetention < 1 || newRetention > 24) {
        showConfigStatus('❌ La rétention doit être entre 1 et 24 mois', 'error');
        return;
      }

      const timezoneInput = document.getElementById('timezone-offset');
      const newTimezoneOffset = parseInt(timezoneInput.value);
      
      if (isNaN(newTimezoneOffset) || newTimezoneOffset < -12 || newTimezoneOffset > 14) {
        showConfigStatus('❌ Le décalage horaire doit être entre -12 et +14 heures', 'error');
        return;
      }

      // Récupérer l'état du toggle Docker
      const dockerToggle = document.getElementById('show-docker-toggle');
      const newShowDockerSection = dockerToggle ? dockerToggle.checked : true;

      // Récupérer les seuils d'alerte
      const cpuThresholdInput = document.getElementById('cpu-threshold');
      const memoryThresholdInput = document.getElementById('memory-threshold');
      const diskThresholdInput = document.getElementById('disk-threshold');
      
      const newCpuThreshold = parseInt(cpuThresholdInput.value);
      const newMemoryThreshold = parseInt(memoryThresholdInput.value);
      const newDiskThreshold = parseInt(diskThresholdInput.value);
      
      if (isNaN(newCpuThreshold) || newCpuThreshold < 0 || newCpuThreshold > 100) {
        showConfigStatus('❌ Le seuil CPU doit être entre 0 et 100%', 'error');
        return;
      }
      
      if (isNaN(newMemoryThreshold) || newMemoryThreshold < 0 || newMemoryThreshold > 100) {
        showConfigStatus('❌ Le seuil RAM doit être entre 0 et 100%', 'error');
        return;
      }
      
      if (isNaN(newDiskThreshold) || newDiskThreshold < 0 || newDiskThreshold > 100) {
        showConfigStatus('❌ Le seuil Disque doit être entre 0 et 100%', 'error');
        return;
      }
      
      // Récupérer la configuration Telegram
      const telegramEnabledToggle = document.getElementById('telegram-enabled-toggle');
      const telegramBotTokenInput = document.getElementById('telegram-bot-token');
      const telegramChatIdInput = document.getElementById('telegram-chat-id');
      const telegramCooldownInput = document.getElementById('telegram-cooldown');
      const telegramNotifyResolutionToggle = document.getElementById('telegram-notify-resolution-toggle');
      
      const newTelegramEnabled = telegramEnabledToggle ? telegramEnabledToggle.checked : false;
      const newTelegramBotToken = telegramBotTokenInput ? telegramBotTokenInput.value : '';
      const newTelegramChatId = telegramChatIdInput ? telegramChatIdInput.value : '';
      const newTelegramCooldown = parseInt(telegramCooldownInput ? telegramCooldownInput.value : '15');
      const newTelegramNotifyResolution = telegramNotifyResolutionToggle ? telegramNotifyResolutionToggle.checked : true;
      
      if (isNaN(newTelegramCooldown) || newTelegramCooldown < 1 || newTelegramCooldown > 1440) {
        showConfigStatus('❌ Le délai Telegram doit être entre 1 et 1440 minutes', 'error');
        return;
      }

      try {
        showConfigStatus('🔄 Sauvegarde en cours...', 'info');
        
        const response = await fetch('/api/config', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            metricsInterval: newInterval,
            dataRetentionMonths: newRetention,
            timezoneOffset: newTimezoneOffset,
            showDockerSection: newShowDockerSection,
            cpuThreshold: newCpuThreshold,
            memoryThreshold: newMemoryThreshold,
            diskThreshold: newDiskThreshold,
            telegramEnabled: newTelegramEnabled,
            telegramBotToken: newTelegramBotToken,
            telegramChatId: newTelegramChatId,
            telegramCooldownMinutes: newTelegramCooldown,
            telegramNotifyResolution: newTelegramNotifyResolution
          }),
          credentials: 'include'
        });
        
        const data = await response.json();
        
        if (data.success) {
          currentConfig.metricsInterval = newInterval;
          currentConfig.dataRetentionMonths = newRetention;
          currentConfig.timezoneOffset = newTimezoneOffset;
          currentConfig.showDockerSection = newShowDockerSection;
          currentConfig.alerts = {
            cpuThreshold: newCpuThreshold,
            memoryThreshold: newMemoryThreshold,
            diskThreshold: newDiskThreshold
          };
          currentConfig.telegram = {
            enabled: newTelegramEnabled,
            botToken: newTelegramBotToken,
            chatId: newTelegramChatId,
            cooldownMinutes: newTelegramCooldown,
            notifyResolution: newTelegramNotifyResolution
          };
          showConfigStatus('✅ Configuration sauvegardée avec succès!', 'success');
          
          // Fermer la modal immédiatement
          closeConfigModal();
          
          // Rafraîchir la page pour appliquer les changements
          setTimeout(() => {
            window.location.reload();
          }, 500);
        } else {
          showConfigStatus(`❌ Erreur: ${data.error || 'Impossible de sauvegarder'}`, 'error');
        }
      } catch (error) {
        console.error('❌ Erreur sauvegarde configuration:', error);
        showConfigStatus('❌ Impossible de sauvegarder la configuration', 'error');
      }
    }

    // Fonction pour envoyer un message test Telegram
    async function sendTelegramTest() {
      try {
        showConfigStatus(window.i18n ? window.i18n.t('config.status_saving') : 'Envoi en cours...', 'info');
        
        const response = await fetch('/api/telegram/send-test', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          credentials: 'include'
        });
        
        const data = await response.json();
        
        if (data.success) {
          showConfigStatus(window.i18n ? window.i18n.t('config.telegram_test_success') : '✅ Message test envoyé avec succès!', 'success');
        } else {
          showConfigStatus(`${window.i18n ? window.i18n.t('config.telegram_test_error') : '❌ Échec'} : ${data.message || 'Unknown error'}`, 'error');
        }
      } catch (error) {
        console.error('❌ Erreur envoi test Telegram:', error);
        showConfigStatus(window.i18n ? window.i18n.t('config.telegram_test_error') : '❌ Échec de l\'envoi du message test', 'error');
      }
    }

    // Fonction pour afficher un message de statut
    function showConfigStatus(message, type = 'info') {
      const statusElement = document.getElementById('config-status');
      if (statusElement) {
        statusElement.textContent = message;
        statusElement.className = `config-status ${type}`;
        statusElement.style.display = 'flex';
      }
    }

    // Fonction pour cacher le message de statut
    function hideConfigStatus() {
      const statusElement = document.getElementById('config-status');
      if (statusElement) {
        statusElement.style.display = 'none';
      }
    }

    // Fonction pour mettre à jour les intervalles de rafraîchissement du frontend
    async function updateFrontendIntervals(newInterval) {
      // Arrêter les intervalles existants
      if (window.metricsIntervalId) clearInterval(window.metricsIntervalId);
      if (window.processesIntervalId) clearInterval(window.processesIntervalId);
      if (window.portsIntervalId) clearInterval(window.portsIntervalId);
      
      // Redémarrer avec le nouvel intervalle
      const updates = [];
      
      if (typeof updateMetrics === 'function') {
        updates.push(updateMetrics()); // Mise à jour immédiate
        window.metricsIntervalId = setInterval(updateMetrics, newInterval);
      }
      if (typeof updateProcesses === 'function') {
        updates.push(updateProcesses());
        // Garder un intervalle différent pour les processus (2x l'intervalle de base)
        window.processesIntervalId = setInterval(updateProcesses, newInterval * 2);
      }
      if (typeof updatePorts === 'function') {
        updates.push(updatePorts());
        window.portsIntervalId = setInterval(updatePorts, newInterval * 6);
      }
      if (typeof updateDockerInfo === 'function') {
        updates.push(updateDockerInfo());
      }
      
      // Attendre que toutes les mises à jour initiales soient terminées
      await Promise.all(updates);
      console.log(`✅ Intervalles de rafraîchissement mis à jour: ${newInterval}ms`);
    }

    // Initialisation de la gestion de configuration
    document.addEventListener('DOMContentLoaded', () => {
      // Charger le bouton de configuration
      const configBtn = document.getElementById('config-btn');
      if (configBtn) {
        configBtn.addEventListener('click', openConfigModal);
      }
      
      // Charger la modal
      const modal = document.getElementById('config-modal');
      if (modal) {
        // Fermer quand on clique en dehors de la modal
        modal.addEventListener('click', (e) => {
          if (e.target === modal) {
            closeConfigModal();
          }
        });
      }
      
      // Bouton de fermeture
      const closeBtn = document.getElementById('close-config');
      if (closeBtn) {
        closeBtn.addEventListener('click', closeConfigModal);
      }
      
      // Bouton annuler
      const cancelBtn = document.getElementById('cancel-config');
      if (cancelBtn) {
        cancelBtn.addEventListener('click', closeConfigModal);
      }
      
      // Bouton sauvegarder
      const saveBtn = document.getElementById('save-config');
      if (saveBtn) {
        saveBtn.addEventListener('click', saveConfig);
      }
      
      // Boutons de présélection
      document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const value = parseInt(btn.dataset.value);
          applyPresetValue(value);
        });
      });
      
      // Bouton pour effacer toutes les données
      const clearAllBtn = document.getElementById('clear-all-data');
      if (clearAllBtn) {
        clearAllBtn.addEventListener('click', clearAllData);
      }
      
      // Bouton pour envoyer un message test Telegram
      const telegramTestBtn = document.getElementById('telegram-test-btn');
      if (telegramTestBtn) {
        telegramTestBtn.addEventListener('click', sendTelegramTest);
      }

      // Toggle pour afficher/masquer Docker Engine
      const dockerToggle = document.getElementById('show-docker-toggle');
      if (dockerToggle) {
        dockerToggle.addEventListener('change', function() {
          currentConfig.showDockerSection = this.checked;
          applyDockerSectionVisibility();
        });
      }
      
      // Bouton de basculement de thème dans la modal
      const themeToggleBtn = document.getElementById('config-dark-toggle');
      if (themeToggleBtn) {
        themeToggleBtn.addEventListener('click', () => {
          toggleDarkModeFromConfig();
        });
        // Gérer les clics sur les options de thème directement
        themeToggleBtn.querySelectorAll('.theme-option').forEach(option => {
          option.addEventListener('click', (e) => {
            e.stopPropagation();
            const desiredTheme = option.dataset.theme;
            const isDark = desiredTheme === 'dark';
            
            // Appliquer le thème
            document.body.classList.toggle('dark-mode', isDark);
            
            // Sauvegarder la préférence
            localStorage.setItem('vps_monitoring_dark_mode', isDark ? 'true' : 'false');
            
            // Rafraîchir les graphiques
            if (typeof refreshAllCharts === 'function') {
              refreshAllCharts();
            }
            
            // Mettre à jour les boutons
            updateThemeToggleButton();
            showConfigStatus('✅ Thème mis à jour!', 'success');
          });
        });
      }
      
      // Fermer avec la touche Échap
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          closeConfigModal();
        }
      });
      
      // Charger la configuration au démarrage et mettre à jour les intervalles
      // Mais seulement si l'authentification est vérifiée
      window.authPromise.then(async () => {
        console.log('🔍 [DEBUG] Auth check complete. userAuthenticated:', window.userAuthenticated);
        if (window.userAuthenticated) {
          await loadCurrentConfig();
          console.log('🔍 [DEBUG] Config loaded. metricsInterval:', currentConfig.metricsInterval);
          if (currentConfig.metricsInterval) {
            console.log('🔍 [DEBUG] Starting updateFrontendIntervals with interval:', currentConfig.metricsInterval);
            await updateFrontendIntervals(currentConfig.metricsInterval);
          } else {
            console.error('❌ [DEBUG] metricsInterval is undefined!');
          }
          
          // Rafraîchir les graphiques avec le décalage horaire chargé
          console.log('🔍 [DEBUG] Timezone offset loaded:', currentConfig.timezoneOffset);
          if (typeof refreshAllCharts === 'function') {
            refreshAllCharts();
          }
          if (typeof updateNetworkChart === 'function') {
            updateNetworkChart('day');
          }
        } else {
          console.error('❌ [DEBUG] User is NOT authenticated! Redirecting...');
          window.location.href = '/login';
        }
      }).catch(error => {
        console.error('❌ [DEBUG] Error in auth flow:', error);
        window.location.href = '/login';
      });
      
      // Charger la préférence de mode sombre au démarrage
      const savedDarkMode = localStorage.getItem('vps_monitoring_dark_mode');
      const isDark = savedDarkMode === 'true';
      if (isDark) {
        document.body.classList.add('dark-mode');
        // Rafraîchir les graphiques avec les bonnes couleurs
        if (typeof refreshAllCharts === 'function') {
          refreshAllCharts();
        }
      }
    });
  </script>

  <!-- Gestion du sélecteur de langue -->
  <script>
    // Attendre que i18n et DOM soient prêts
    async function initializeLanguageSelector() {
      // Attendre que i18n soit chargé
      await new Promise(resolve => {
        const checkI18n = setInterval(() => {
          if (window.i18n && window.i18n.loaded) {
            clearInterval(checkI18n);
            resolve();
          }
        }, 100);
      });

      // Récupérer le sélecteur de langue
      const langSelect = document.getElementById('language-select');
      if (!langSelect) return;

      // Définir la valeur actuelle
      langSelect.value = window.i18n.getCurrentLang();

      // Écouter les changements
      langSelect.addEventListener('change', async (e) => {
        const newLang = e.target.value;
        await window.i18n.changeLanguage(newLang);
        
        // Mettre à jour le sélecteur avec les nouvelles traductions
        const options = langSelect.querySelectorAll('option');
        options.forEach(opt => {
          const key = `language.${opt.value}`;
          opt.textContent = window.i18n.t(key);
        });
        
        // Recharger la page pour appliquer la langue partout
        // (nécessaire pour les textes qui ne sont pas gérés par data-i18n)
        window.location.reload();
      });

      // Mettre à jour les options du sélecteur avec les traductions actuelles
      const options = langSelect.querySelectorAll('option');
      options.forEach(opt => {
        const key = `language.${opt.value}`;
        opt.textContent = window.i18n.t(key);
      });
    }

    // Initialiser le sélecteur de langue quand la page est chargée
    document.addEventListener('DOMContentLoaded', initializeLanguageSelector);
  </script>
